<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Order Composer</title>
<style>
body{margin:0;background:#f2f2f2;font-family:Arial, Helvetica, sans-serif;font-size:13px;}
.wrapper{width:1200px;margin:20px auto;}
.title{font-size:20px;margin-bottom:10px;}
.main{display:flex;gap:15px;}
.panel{background:#fff;border:1px solid #ccc;padding:10px;}
.left{width:420px;}
.right{flex:1;}
.scroll{height:600px;overflow-y:auto;border:1px solid #ddd;padding:5px;}
.order{display:flex;align-items:center;border:1px solid #e0e0e0;margin-bottom:4px;padding:4px;background:#fafafa;cursor:pointer;}
.order:hover{background:#eef6ff;}
.order.wait{background:#e8e8e8;}
.order img{width:36px;height:36px;object-fit:contain;margin-right:6px;}
.info{flex:1;line-height:1.3;word-break:break-all;}
.timebox{width:120px;text-align:right;font-weight:bold;margin-right:6px;}
.controls{margin-bottom:8px;}
button{font-size:12px;padding:2px 6px;margin-right:4px;}
.total{margin-top:6px;font-weight:bold;}
</style>
</head>
<body>
<div class="wrapper">
  <div class="title">Order Composer</div>
  <div class="main">
    <!-- LEFT -->
    <div class="panel left">
      <div class="controls">
        <button onclick="addWait(5)">+5秒</button>
        <button onclick="addWait(10)">+10秒</button>
        <input type="number" id="waitInput" style="width:70px;">
        <button onclick="addCustomWait()">追加</button>
        <button onclick="resetAll()">リセット</button>
        <button onclick="copyShareUrl()">共有URLをコピー</button>
      </div>
      <div id="selected" class="scroll"></div>
      <div class="total" id="totalTime">合計: 0秒</div>
    </div>

    <!-- RIGHT -->
    <div class="panel right">
      <div id="list" class="scroll"></div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
<script>
const csvUrl="orders.csv";
let originalData=[];

function format(sec){
  sec=Math.max(0,Math.floor(sec));
  return Math.floor(sec/60)+"分"+(sec%60)+"秒";
}

// CSV読み込み
Papa.parse(csvUrl,{
  download:true,
  header:true,
  complete:function(res){
    originalData=res.data.filter(r=>r.effect).map((r,i)=>({...r, idx:i}));
    renderList(sortData(originalData));
    loadFromUrl();
  }
});

// ソート(by時間)
function sortData(data){
  return [...data].sort((a,b)=>
    (Number(a.prep_time)+Number(a.start_time))
    -(Number(b.prep_time)+Number(b.start_time))
  );
}

// 右側リスト表示
function renderList(data){
  const list=document.getElementById("list");
  list.innerHTML="";
  data.forEach(row=>{
    const el=createOrder(row,false);
    el.ondblclick=()=>addSelected(row);
    list.appendChild(el);
  });
}

// オーダー作成
function createOrder(row,isSelected){
  const div=document.createElement("div");
  div.className="order";
  div.draggable=isSelected;
  if(row.effect==="待つ") div.classList.add("wait");

  if(isSelected){
    const time=document.createElement("div");
    time.className="timebox";
    div.appendChild(time);
  }

  const img=document.createElement("img");
  img.src=row.image_url||"";
  div.appendChild(img);

  const info=document.createElement("div");
  info.className="info";
  const level=row.level?` (${row.level})`:"";
  info.innerHTML=
    row.effect+level+"<br>"+
    row.prep_time+"+"+row.start_time+"秒<br>"+
    (row.name1||"")+(row.name2?","+row.name2:"");
  div.appendChild(info);

  div.dataset.idx=row.idx;
  if(isSelected) enableDrag(div);
  return div;
}

// 選択オーダーに追加
function addSelected(row){
  const sel=document.getElementById("selected");
  const el=createOrder(row,true);
  sel.appendChild(el);
  updateTimes();
}

// ドラッグ＆ドロップ有効化
function enableDrag(el){
  el.addEventListener("dragstart",()=>el.classList.add("dragging"));
  el.addEventListener("dragend",()=>{
    el.classList.remove("dragging");
    updateTimes();
  });
  el.addEventListener("dragover",e=>e.preventDefault());
  el.addEventListener("drop",e=>{
    e.preventDefault();
    const dragging=document.querySelector(".dragging");
    if(dragging && dragging!==el){
      el.parentNode.insertBefore(dragging,el);
    }
    updateTimes();
  });
}

// 時間計算（残り準備/発動）
function updateTimes(){
  const items=document.querySelectorAll("#selected .order");
  let remaining=900; // 15分
  let total=0;

  items.forEach(div=>{
    const m=div.innerHTML.match(/(\d+)\+(\d+)秒/);
    let prep=0,start=0;
    if(m){
      prep=Number(m[1]);
      start=Number(m[2]);
    }

    let activation;

    if(div.classList.contains("wait")){
      activation = Math.max(0, remaining - start);
      div.querySelector(".timebox").innerHTML =
        format(remaining)+" / "+format(activation);
      remaining = activation;
      total += start;
    } else {
      activation = Math.max(0, remaining - prep);
      div.querySelector(".timebox").innerHTML =
        format(remaining)+" / "+format(activation);
      remaining = Math.max(0, activation - start);
      total += prep + start;
    }
  });

  document.getElementById("totalTime").innerText="合計: "+total+"秒";
}

// 待つボタン
function addWait(sec){
  addSelected({
    effect:"待つ",
    prep_time:0,
    start_time:sec,
    name1:"",
    name2:"",
    image_url:"",
    idx:originalData.length
  });
}

function addCustomWait(){
  const sec=Number(document.getElementById("waitInput").value);
  if(sec>0) addWait(sec);
  document.getElementById("waitInput").value="";
}

// リセット
function resetAll(){
  document.getElementById("selected").innerHTML="";
  document.getElementById("totalTime").innerText="合計: 0秒";
}

// 共有URLコピー
function copyShareUrl(){
  const items=document.querySelectorAll("#selected .order");
  const arr=[];
  items.forEach(div=>{
    if(div.classList.contains("wait")){
      const sec=div.querySelector(".info").innerHTML.match(/(\d+)秒/);
      arr.push(`w${sec?sec[1]:0}`);
    } else {
      arr.push(div.dataset.idx);
    }
  });
  const url=window.location.origin+window.location.pathname+"?orders="+arr.join(",");
  navigator.clipboard.writeText(url)
    .then(()=>alert("共有用URLをコピーしました！"))
    .catch(()=>alert("コピーに失敗しました"));
}

// URL復元
function loadFromUrl(){
  const params=new URLSearchParams(window.location.search);
  const orders=params.get("orders");
  if(!orders) return;
  const arr=orders.split(",");
  arr.forEach(id=>{
    if(id.startsWith("w")){
      addWait(Number(id.slice(1)));
    } else {
      const i=Number(id);
      if(originalData[i]) addSelected(originalData[i]);
    }
  });
}
</script>
</body>
</html>
