<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Order Composer</title>

<style>
body {
  margin: 0;
  font-family: sans-serif;
}

.tabs {
  display: flex;
  background: #f1f1f1;
  border-bottom: 1px solid #ccc;
}

.tab {
  padding: 10px 16px;
  cursor: pointer;
  border-right: 1px solid #ccc;
  background: #e9e9e9;
  transition: 0.2s;
}

.tab:hover {
  background: #dcdcdc;
}

.tab.active {
  background: #007bff;
  color: white;
}

.container {
  display: flex;
  height: calc(100vh - 42px);
}

.left, .right {
  width: 50%;
  padding: 10px;
  overflow-y: auto;
}

.order-item {
  padding: 6px;
  border-bottom: 1px solid #ddd;
  cursor: pointer;
}

.order-item:hover {
  background: #f5f5f5;
}

.order-item.disabled {
  background: #eee;
  color: #999;
  cursor: not-allowed;
}

.selected-item {
  padding: 6px;
  border-bottom: 1px solid #ddd;
}

.memo {
  font-size: 12px;
  margin-top: 4px;
  color: #666;
}
</style>
</head>
<body>

<div class="tabs" id="tabs"></div>

<div class="container">
  <div class="left">
    <h3>オーダー一覧</h3>
    <div id="orderList"></div>
  </div>

  <div class="right">
    <h3>選択オーダー</h3>
    <div id="selectedList"></div>
  </div>
</div>

<script>
/* =============================
   4タブ設定（旧UI版）
============================= */

const sheetTabs = {

  "マッチ全部":
    "https://docs.google.com/spreadsheets/d/e/2PACX-1vRNltvz7UjpE5-78DcrBQIJfHZgWF6fYUOoWFWqQp26-WCK55Dr-Lj_UfPJFLPdNtFJVH2mYgdjAD_0/pub?output=csv",

  "マッチ抜粋":
    "https://docs.google.com/spreadsheets/d/e/2PACX-1vQ8kWKqg_F9WbS-RrORRAv2JAuIdRFW4nAqa8Kr0mCVoOBq38L1d6KWWIwr3tMDTMP_zjgGMQAhtgJf/pub?output=csv",

  "対ヒュージ全部":
    "https://docs.google.com/spreadsheets/d/e/2PACX-1vRrbl7KlmckTwepgTYSOxK9w2nTI2gLtgN2PYgqXDXtDzsSHGgiY5FM3SHPYCGoSDW4umNRpBxGguv9/pub?output=csv",

  "対ヒュージ抜粋":
    "https://docs.google.com/spreadsheets/d/e/2PACX-1vSAKIyowf9Shrwg84hXR1yLFS-AqaKO0BGKRd9HX3Ro1TKxitsVYp4yCWY6acyzUlISAAZMKIbYwsef/pub?output=csv"
};

let currentTab = null;
let allOrders = [];
let selectedOrders = [];

/* =============================
   タブ生成
============================= */

function createTabs() {
  const tabsDiv = document.getElementById("tabs");
  tabsDiv.innerHTML = "";

  Object.keys(sheetTabs).forEach((name, index) => {
    const tab = document.createElement("div");
    tab.className = "tab";
    tab.textContent = name;

    if (index === 0) {
      tab.classList.add("active");
      currentTab = name;
      loadCSV(sheetTabs[name]);
    }

    tab.onclick = () => {
      document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
      tab.classList.add("active");
      currentTab = name;
      selectedOrders = [];
      renderSelected();
      loadCSV(sheetTabs[name]);
    };

    tabsDiv.appendChild(tab);
  });
}

/* =============================
   CSV読み込み
============================= */

function loadCSV(url) {
  fetch(url)
    .then(res => res.text())
    .then(text => {
      const rows = text.split("\n").map(r => r.split(","));
      const headers = rows[0];
      allOrders = rows.slice(1).map(row => {
        let obj = {};
        headers.forEach((h, i) => obj[h.trim()] = row[i] || "");
        return obj;
      });
      renderOrders();
    });
}

/* =============================
   左側描画
============================= */

function renderOrders() {
  const list = document.getElementById("orderList");
  list.innerHTML = "";

  allOrders.forEach(order => {
    const name = order["名前"] || order["name"] || "名称未設定";

    const div = document.createElement("div");
    div.className = "order-item";
    div.textContent = name;

    if (selectedOrders.some(o => (o["名前"]||o["name"]) === name)) {
      div.classList.add("disabled");
    }

    div.onclick = () => {
      if (div.classList.contains("disabled")) return;
      addOrder(order);
    };

    list.appendChild(div);
  });
}

/* =============================
   追加処理
============================= */

function addOrder(order) {
  const name = order["名前"] || order["name"];
  if (selectedOrders.some(o => (o["名前"]||o["name"]) === name)) return;

  selectedOrders.push(order);
  renderSelected();
  renderOrders();
}

/* =============================
   右側描画
============================= */

function renderSelected() {
  const list = document.getElementById("selectedList");
  list.innerHTML = "";

  selectedOrders.forEach(order => {
    const name = order["名前"] || order["name"];

    const div = document.createElement("div");
    div.className = "selected-item";

    div.innerHTML = `
      <div>${name}</div>
      ${order["メモ"] ? `<div class="memo">${order["メモ"]}</div>` : ""}
    `;

    list.appendChild(div);
  });
}

/* =============================
   初期化
============================= */

createTabs();

</script>
</body>
</html>
