<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Order Composer</title>
<style>
body {font-family:sans-serif;margin:0;display:flex;height:100vh;}
#left {width:50%;overflow-y:auto;border-right:1px solid #ccc;}
#right {width:50%;display:flex;flex-direction:column;}
.tabs {display:flex;background:#eee;}
.tab {padding:10px;cursor:pointer;}
.tab.active {background:#fff;border-bottom:2px solid #000;}
.order {border-bottom:1px solid #ddd;padding:8px;cursor:pointer;}
.selected {flex:1;overflow-y:auto;border-bottom:1px solid #ccc;}
.selected .order {background:#f9f9f9;}
.time {font-size:12px;color:#555;margin-top:4px;}
button {margin:5px;}
.memo {width:100%;margin-top:4px;}
</style>
</head>
<body>

<div id="left">
  <div class="tabs">
    <div class="tab active" data-tab="match_all">マッチ全部</div>
    <div class="tab" data-tab="match_pick">マッチ抜粋</div>
    <div class="tab" data-tab="huge_all">対ヒュージ全部</div>
    <div class="tab" data-tab="huge_pick">対ヒュージ抜粋</div>
  </div>
  <div id="list"></div>
</div>

<div id="right">
  <div class="selected" id="selected"></div>
  <div>
    <button onclick="addWait()">待つ</button>
    <button onclick="shareOrders()">共有</button>
  </div>
</div>

<script>
const CSV_URLS = {
match_all: "★ここにCSV1",
match_pick: "★ここにCSV2",
huge_all: "★ここにCSV3",
huge_pick: "★ここにCSV4"
};

let currentTab="match_all";
let originalData=[];
let restoreData=null;
const TOTAL_TIME=900;

function parseCSV(text){
const rows=text.trim().split("\n").map(r=>r.split(","));
const header=rows.shift();
return rows.map(r=>{
let obj={};
header.forEach((h,i)=>obj[h.trim()]=r[i]);
return obj;
});
}

async function loadCSV(tab){
const res=await fetch(CSV_URLS[tab]);
const text=await res.text();
const parsed=parseCSV(text);

originalData=parsed.map(r=>({
...r,
uid:r.id
}));

originalData.sort((a,b)=>Number(a.order)-Number(b.order));

renderList();
if(restoreData) restoreFromData();
}

function renderList(){
const list=document.getElementById("list");
list.innerHTML="";
originalData.forEach(row=>{
const div=document.createElement("div");
div.className="order";
div.textContent=row.effect;
div.onclick=()=>addSelected(row);
list.appendChild(div);
});
}

function addSelected(row){
const div=document.createElement("div");
div.className="order";
div.dataset.uid=row.uid||("wait_"+Date.now());
div.dataset.prep=row.prep_time||0;
div.dataset.start=row.start_time||0;

div.innerHTML=`
<strong>${row.effect}</strong>
<div class="time"></div>
<textarea class="memo" placeholder="メモ"></textarea>
`;

document.getElementById("selected").appendChild(div);
updateTimes();
}

function addWait(){
const sec=prompt("待つ秒数を入力");
if(!sec) return;
addSelected({
effect:"待つ",
prep_time:0,
start_time:Number(sec),
uid:"wait_"+Date.now()
});
}

function formatTime(sec){
const sign=sec<0?"-":"";
sec=Math.abs(sec);
const m=Math.floor(sec/60);
const s=sec%60;
return sign+m+"分"+String(s).padStart(2,"0")+"秒";
}

function updateTimes(){
let remain=TOTAL_TIME;
const items=[...document.querySelectorAll("#selected .order")];

items.forEach(div=>{
const prep=Number(div.dataset.prep);
const start=Number(div.dataset.start);

const trigger=remain-prep;
const end=remain-prep-start;

div.querySelector(".time").innerHTML=
`残り時間 ${formatTime(remain)}<br>
発動 ${formatTime(trigger)}<br>
効果終了 ${formatTime(end)}`;

remain=end;
});
}

function shareOrders(){
const items=[...document.querySelectorAll("#selected .order")];
const data=items.map(div=>({
uid:div.dataset.uid,
prep:div.dataset.prep,
start:div.dataset.start,
memo:div.querySelector(".memo").value
}));
const encoded=btoa(JSON.stringify(data));
const url=location.origin+location.pathname+"?s="+encoded;
navigator.clipboard.writeText(url);
alert("共有URLをコピーしました");
}

function restoreFromData(){
restoreData.forEach(item=>{
if(String(item.uid).startsWith("wait_")){
addSelected({
effect:"待つ",
prep_time:item.prep,
start_time:item.start,
uid:item.uid
});
return;
}
const row=originalData.find(r=>String(r.uid)===String(item.uid));
if(row){
addSelected(row);
const last=[...document.querySelectorAll("#selected .order")].pop();
last.querySelector(".memo").value=item.memo||"";
}
});
restoreData=null;
updateTimes();
}

function switchTab(tab){
currentTab=tab;
document.querySelectorAll(".tab").forEach(t=>{
t.classList.toggle("active",t.dataset.tab===tab);
});
loadCSV(tab);
}

document.querySelectorAll(".tab").forEach(tab=>{
tab.onclick=()=>switchTab(tab.dataset.tab);
});

function checkRestore(){
const params=new URLSearchParams(location.search);
if(params.has("s")){
restoreData=JSON.parse(atob(params.get("s")));
}
}

checkRestore();
loadCSV(currentTab);
</script>
</body>
</html>
