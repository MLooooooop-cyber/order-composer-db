<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Order Composer CSV版</title>
<style>
body { font-family: sans-serif; background:#f0f0f0; margin:0; padding:0; }
#container { display:flex; }
#left, #right { padding:10px; }
#left { width:50%; background:#fff; }
#right { width:50%; background:#eee; }
.order { border:1px solid #ccc; margin:5px; padding:5px; background:#fff; cursor:move; }
.time-display { font-weight:bold; margin-right:5px; }
.wait-btn { margin:2px; cursor:pointer; }
</style>
</head>
<body>
<h2>Order Composer CSV版</h2>
<div>
<label>CSVファイル: <input type="file" id="csvFile"></label>
</div>
<div id="container">
<div id="left">
<h3>選択オーダー</h3>
<div id="selectedOrders"></div>
<div>
<button class="wait-btn" data-seconds="5">待つ 5秒</button>
<button class="wait-btn" data-seconds="10">待つ 10秒</button>
<input type="number" id="waitCustom" placeholder="秒数">
<button id="waitAdd">待つ追加</button>
</div>
<div>
<a id="shareLink" href="#">共有リンクをコピー</a>
</div>
</div>
<div id="right">
<h3>オーダー一覧</h3>
<div id="orderList"></div>
</div>
</div>

<script>
// CSV読み込み
let orders = [];
document.getElementById('csvFile').addEventListener('change', function(e){
    const file = e.target.files[0];
    const reader = new FileReader();
    reader.onload = function(e){
        const text = e.target.result;
        parseCSV(text);
        renderOrderList();
    };
    reader.readAsText(file);
});

function parseCSV(text){
    orders = [];
    const lines = text.split(/\r?\n/);
    const header = lines.shift().split(',');
    for(const line of lines){
        if(!line.trim()) continue;
        const cols = line.split(',');
        orders.push({
            effect: cols[0],
            prep_time: parseInt(cols[1]),
            start_time: parseInt(cols[2]),
            name1: cols[3],
            name2: cols[4],
            level: cols[5]
        });
    }
}

// オーダー一覧表示
function renderOrderList(){
    const container = document.getElementById('orderList');
    container.innerHTML = '';
    orders.forEach((o,i)=>{
        const div = document.createElement('div');
        div.className='order';
        div.textContent = `${o.effect} (${o.name1}${o.name2?','+o.name2:''}) Lv:${o.level}`;
        div.draggable=true;
        div.addEventListener('dragstart', e=>{
            e.dataTransfer.setData('text/plain', i);
        });
        div.addEventListener('dblclick', ()=>addSelectedOrder(i));
        container.appendChild(div);
    });
}

// 選択オーダー管理
let selected = [];
function addSelectedOrder(idx){
    const o = Object.assign({}, orders[idx]);
    selected.push(o);
    renderSelected();
}

// 選択リスト描画
function renderSelected(){
    const container = document.getElementById('selectedOrders');
    container.innerHTML = '';
    let elapsed = 0;
    selected.forEach((o,i)=>{
        const div = document.createElement('div');
        div.className='order';
        const remainingPrep = Math.max(0, 15*60 - elapsed); // 残り準備時間
        const activation = Math.max(0, remainingPrep - o.prep_time);
        div.innerHTML = `<span class="time-display">${formatTime(remainingPrep)} / ${formatTime(activation)}</span><br>${o.effect}<br>${o.name1}${o.name2?','+o.name2:''}`;
        elapsed += o.prep_time + o.start_time;
        container.appendChild(div);
    });
    updateShareLink();
}

// 時間フォーマット
function formatTime(sec){
    const m = Math.floor(sec/60);
    const s = sec%60;
    return `${m}分${s}秒`;
}

// 待つボタン
document.querySelectorAll('.wait-btn').forEach(btn=>{
    btn.addEventListener('click', ()=>{
        const sec = parseInt(btn.dataset.seconds);
        addWait(sec);
    });
});
document.getElementById('waitAdd').addEventListener('click', ()=>{
    const sec = parseInt(document.getElementById('waitCustom').value);
    if(sec>0) addWait(sec);
});

function addWait(sec){
    selected.push({effect:'待つ', prep_time:sec, start_time:sec, name1:'待つ', name2:'', level:''});
    renderSelected();
}

// 共有リンク生成
function updateShareLink(){
    const data = selected.map(o=>`${o.effect}|${o.prep_time}|${o.start_time}|${o.name1}|${o.name2}|${o.level}`).join(',');
    const url = location.origin + location.pathname + '?data=' + encodeURIComponent(data);
    const a = document.getElementById('shareLink');
    a.href=url;
}

// URLから復元
window.addEventListener('load', ()=>{
    const params = new URLSearchParams(location.search);
    const data = params.get('data');
    if(data){
        selected = data.split(',').map(s=>{
            const c = s.split('|');
            return {effect:c[0],prep_time:parseInt(c[1]),start_time:parseInt(c[2]),name1:c[3],name2:c[4],level:c[5]};
        });
        renderSelected();
    }
});
</script>
</body>
</html>
