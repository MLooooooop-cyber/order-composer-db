<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>オーダーコンポーザー</title>
<style>
  body { font-family: sans-serif; padding: 20px; }
  table { border-collapse: collapse; width: 100%; }
  th, td { border: 1px solid #aaa; padding: 6px 10px; text-align: left; }
  th { background-color: #f0f0f0; }
  tr:nth-child(even) { background-color: #f9f9f9; }
</style>
</head>
<body>
<h1>オーダーコンポーザー（全部 by 時間）</h1>

<table id="order-table">
  <thead>
    <tr>
      <th>効果</th>
      <th>準備時間</th>
      <th>発動時間</th>
      <th>名前1</th>
      <th>名前2</th>
    </tr>
  </thead>
  <tbody>
    <!-- CSVデータがここに挿入されます -->
  </tbody>
</table>

<!-- CSV読み込み用ライブラリ -->
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
<script>
  const csvUrl = 'orders.csv'; // GitHubにアップしたCSVファイル名

  Papa.parse(csvUrl, {
    download: true,
    header: true,
    complete: function(results) {
      let data = results.data;

      // 空行を除外
      data = data.filter(row => row.effect);

      // 準備時間 + 発動時間でソート（全部 by 時間順）
      data.sort((a, b) => (Number(a.prep_time) + Number(a.start_time)) - (Number(b.prep_time) + Number(b.start_time)));

      const tbody = document.getElementById('order-table').querySelector('tbody');

      data.forEach(row => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>${row.effect}</td>
          <td>${row.prep_time}</td>
          <td>${row.start_time}</td>
          <td>${row.name1}</td>
          <td>${row.name2 || ''}</td>
        `;
        tbody.appendChild(tr);
      });
    },
    error: function(err) {
      console.error('CSV読み込み失敗', err);
      alert('データ読み込みに失敗しました。CSVのURLや形式を確認してください。');
    }
  });
</script>
</body>
</html>
