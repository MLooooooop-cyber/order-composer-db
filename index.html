<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Order Composer</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#111;
  color:#fff;
}

.container{
  display:flex;
  height:100vh;
}

.panel{
  flex:1;
  padding:10px;
  overflow-y:auto;
  border-right:1px solid #333;
}

.panel:last-child{
  border-right:none;
}

.order{
  display:flex;
  align-items:flex-start;
  gap:8px;
  padding:6px;
  margin-bottom:6px;
  background:#222;
  border-radius:6px;
  cursor:pointer;
  position:relative;
}

.order img{
  width:48px;
  height:48px;
  object-fit:cover;
  border-radius:4px;
}

.info{
  font-size:12px;
  line-height:1.4;
}

.wait{
  background:#333;
}

.memo{
  margin-top:4px;
  width:100%;
}

.timebox{
  position:absolute;
  right:6px;
  top:6px;
  font-size:11px;
  text-align:right;
  color:#0f0;
}

#totalTime{
  padding:10px;
  background:#000;
  font-size:14px;
  border-top:1px solid #333;
}
</style>
</head>

<body>

<div class="container">
  <div class="panel">
    <h3>一覧</h3>
    <div id="list"></div>
  </div>

  <div class="panel">
    <h3>選択オーダー</h3>
    <div id="selected"></div>
    <div id="totalTime"></div>
  </div>
</div>

<script>

let originalData = [];

// ダミーデータ（本番ではCSV読み込み部分に置き換え）
originalData = [
  {idx:1,effect:"攻撃",prep_time:10,start_time:5,name1:"スキルA",image_url:""},
  {idx:2,effect:"待つ",prep_time:0,start_time:15,name1:"待機",image_url:""},
  {idx:3,effect:"防御",prep_time:20,start_time:10,name1:"スキルB",image_url:""}
];

function formatTime(sec){
  sec=Math.max(0,Number(sec)||0);
  const m=Math.floor(sec/60);
  const s=sec%60;
  return m+"分"+s+"秒";
}

function createOrder(row,isSelected){
  const div=document.createElement("div");
  div.className="order";
  div.dataset.idx=row.idx;
  div.dataset.prep=row.prep_time||0;
  div.dataset.start=row.start_time||0;
  div.dataset.effect=row.effect;

  if(row.effect==="待つ") div.classList.add("wait");

  if(isSelected){
    const timebox=document.createElement("div");
    timebox.className="timebox";
    div.appendChild(timebox);
  }

  const img=document.createElement("img");
  img.src=row.image_url||"";
  div.appendChild(img);

  const info=document.createElement("div");
  info.className="info";

  info.innerHTML=
    row.effect+"<br>"+
    row.prep_time+"+"+row.start_time+"秒<br>"+
    (row.name1||"");

  if(isSelected){
    const memo=document.createElement("input");
    memo.type="text";
    memo.className="memo";
    memo.placeholder="メモ";
    memo.oninput=updateTimes;
    info.appendChild(memo);

    div.ondblclick=()=>{
      div.remove();
      updateTimes();
      renderList();
    };
  }else{
    div.onclick=()=>{
      const copy=createOrder(row,true);
      document.getElementById("selected").appendChild(copy);
      updateTimes();
    };
  }

  div.appendChild(info);
  return div;
}

function renderList(){
  const list=document.getElementById("list");
  list.innerHTML="";
  originalData.forEach(row=>{
    list.appendChild(createOrder(row,false));
  });
}

// ★ 元の「時間計算（待つ対応）」ロジックそのまま
function updateTimes(){
  const items=document.querySelectorAll("#selected .order");

  let base=900;
  let total=0;

  items.forEach(div=>{
    const prep=Number(div.dataset.prep);
    const start=Number(div.dataset.start);
    const effect=div.dataset.effect;

    if(effect==="待つ"){
      base=Math.max(0,base-start);
      total+=start;
    }else{
      const activation=Math.max(0,base-prep);
      base=Math.max(0,activation-start);
      total+=prep+start;
    }

    const remain=base;
    const activated=900-remain;

    const box=div.querySelector(".timebox");
    if(box){
      box.innerHTML=
        "残 "+formatTime(remain)+"<br>"+
        "発 "+formatTime(activated);
    }
  });

  document.getElementById("totalTime").innerHTML=
    "残り時間 "+formatTime(base)+"<br>"+
    "発動 "+formatTime(900-base)+"<br><br>"+
    "合計: "+total+"秒";
}

renderList();
updateTimes();

</script>

</body>
</html>
