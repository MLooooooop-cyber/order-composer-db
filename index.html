<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>オーダーコンポーザー</title>
<style>
body { font-family: sans-serif; }
#container { display:flex; gap:20px; padding:20px; }
.panel { width:420px; border:1px solid #aaa; padding:10px; }
.order-item {
  border:1px solid #ccc;
  padding:6px;
  margin-bottom:6px;
  background:#f9f9f9;
  display:flex;
  align-items:flex-start;
  cursor:grab;
}
.order-item.wait { background:#eee; }
.order-item img {
  width:40px;
  height:40px;
  object-fit:contain;
  margin-right:8px;
}
.order-text { display:flex; flex-direction:column; }
.time-label {
  min-width:120px;
  font-weight:bold;
  margin-right:8px;
  text-align:right;
  display:flex;
  flex-direction:column;
}
button { margin:2px; }
</style>
</head>
<body>

<h2>オーダーコンポーザー</h2>

<div id="container">

  <div class="panel">
    <h3>選択オーダー</h3>

    <div style="margin-bottom:10px;">
      <button onclick="addWaitPreset(5)">+5秒</button>
      <button onclick="addWaitPreset(10)">+10秒</button>
      <input type="number" id="customWait" placeholder="任意秒数" style="width:90px;">
      <button onclick="addCustomWait()">追加</button>
    </div>

    <div id="selected"></div>
    <button id="reset">リセット</button>
  </div>

  <div class="panel">
    <h3>全部(by時間)</h3>
    <div id="list"></div>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
<script>

const csvUrl = "orders.csv";
let originalData = [];

function formatTime(sec){
  sec = Math.max(0, Math.floor(sec));
  const m = Math.floor(sec/60);
  const s = sec%60;
  return `${m}分${s}秒`;
}

Papa.parse(csvUrl,{
  download:true,
  header:true,
  complete:function(res){
    originalData = res.data.filter(r=>r.effect);
    renderList(sortByTime(originalData));
  }
});

function sortByTime(data){
  return [...data].sort((a,b)=>
    (Number(a.prep_time)+Number(a.start_time))
    -(Number(b.prep_time)+Number(b.start_time))
  );
}

function renderList(data){
  const list = document.getElementById("list");
  list.innerHTML="";
  data.forEach(row=>{
    const div=createOrderItem(row,false);
    div.addEventListener("dblclick",()=>addSelected(row));
    list.appendChild(div);
  });
}

function createOrderItem(row,isSelected){
  const div=document.createElement("div");
  div.className="order-item";
  div.draggable=true;

  if(row.effect==="待つ"){
    div.classList.add("wait");
  }

  if(isSelected){
    const timeLabel=document.createElement("div");
    timeLabel.className="time-label";
    div.appendChild(timeLabel);
  }

  const img=document.createElement("img");
  img.src=row.image_url||"";
  div.appendChild(img);

  const text=document.createElement("div");
  text.className="order-text";

  const level=row.level?` (${row.level})`:"";

  text.innerHTML=
    `${row.effect}${level}<br>`+
    `${row.prep_time}+${row.start_time}秒<br>`+
    `${row.name1||""}${row.name2?","+row.name2:""}`;

  div.appendChild(text);

  enableDrag(div);

  return div;
}

function addSelected(row){
  const sel=document.getElementById("selected");
  const div=createOrderItem(row,true);
  sel.appendChild(div);
  updateTimes();
}

function enableDrag(item){
  item.addEventListener("dragstart",()=>item.classList.add("dragging"));
  item.addEventListener("dragend",()=>{
    item.classList.remove("dragging");
    updateTimes();
  });
  item.addEventListener("dragover",e=>e.preventDefault());
  item.addEventListener("drop",e=>{
    e.preventDefault();
    const dragging=document.querySelector(".dragging");
    if(dragging && dragging!==item){
      item.parentNode.insertBefore(dragging,item);
    }
    updateTimes();
  });
}

/* ===== 確定ロジック ===== */

function updateTimes(){
  const items=document.querySelectorAll("#selected .order-item");
  let baseTime=900;

  items.forEach(div=>{
    const match=div.innerHTML.match(/(\d+)\+(\d+)秒/);
    if(!match)return;

    const prep=Number(match[1]);
    const start=Number(match[2]);

    const activation=Math.max(0,baseTime-prep);

    const label=div.querySelector(".time-label");
    label.innerHTML=
      `残り準備: ${formatTime(baseTime)}<br>`+
      `発動: ${formatTime(activation)}`;

    baseTime=Math.max(0,activation-start);
  });
}

/* ===== 待つ機能 ===== */

function addWaitPreset(sec){
  const row={
    effect:"待つ",
    prep_time:0,
    start_time:sec,
    name1:"",
    name2:"",
    image_url:""
  };
  addSelected(row);
}

function addCustomWait(){
  const sec=Number(document.getElementById("customWait").value);
  if(!sec||sec<=0)return;
  addWaitPreset(sec);
  document.getElementById("customWait").value="";
}

document.getElementById("reset").addEventListener("click",()=>{
  document.getElementById("selected").innerHTML="";
});

</script>
</body>
</html>
