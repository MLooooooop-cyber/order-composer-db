<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Order Composer</title>

<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

<style>
body{
  font-family:sans-serif;
  margin:0;
  padding:0;
}

.tabs{
  display:flex;
  border-bottom:2px solid #ddd;
  background:#f5f5f5;
}

.tab{
  padding:12px 18px;
  cursor:pointer;
  border-right:1px solid #ddd;
}

.tab.active{
  background:white;
  font-weight:bold;
}

.container{
  display:flex;
  height:calc(100vh - 50px);
}

.panel{
  flex:1;
  padding:10px;
  overflow-y:auto;
}

.panel h2{
  margin-top:0;
}

.order{
  border:1px solid #ccc;
  padding:8px;
  margin-bottom:6px;
  cursor:pointer;
  border-radius:6px;
  transition:0.2s;
}

.order:hover{
  background:#f0f8ff;
}

.order.disabled{
  background:#eee;
  color:#999;
  cursor:not-allowed;
}

.order.highlight{
  background:#fff3cd;
  border:2px solid orange;
}

.selected-summary{
  margin-top:10px;
  padding:10px;
  background:#fafafa;
  border-top:1px solid #ddd;
  font-size:14px;
}
</style>
</head>
<body>

<div class="tabs">
  <div class="tab active" onclick="switchTab(0)">マッチ全部</div>
  <div class="tab" onclick="switchTab(1)">マッチ抜粋</div>
  <div class="tab" onclick="switchTab(2)">対ヒュージ全部</div>
  <div class="tab" onclick="switchTab(3)">対ヒュージ抜粋</div>
</div>

<div class="container">
  <div class="panel">
    <h2>オーダー一覧</h2>
    <div id="orderList"></div>
  </div>

  <div class="panel">
    <h2>選択オーダー</h2>
    <div id="selectedList"></div>
    <div class="selected-summary" id="summary"></div>
  </div>
</div>

<script>
const csvUrls = [
  "https://docs.google.com/spreadsheets/d/e/2PACX-1vRNltvz7UjpE5-78DcrBQIJfHZgWF6fYUOoWFWqQp26-WCK55Dr-Lj_UfPJFLPdNtFJVH2mYgdjAD_0/pub?output=csv",
  "https://docs.google.com/spreadsheets/d/e/2PACX-1vQ8kWKqg_F9WbS-RrORRAv2JAuIdRFW4nAqa8Kr0mCVoOBq38L1d6KWWIwr3tMDTMP_zjgGMQAhtgJf/pub?output=csv",
  "https://docs.google.com/spreadsheets/d/e/2PACX-1vRrbl7KlmckTwepgTYSOxK9w2nTI2gLtgN2PYgqXDXtDzsSHGgiY5FM3SHPYCGoSDW4umNRpBxGguv9/pub?output=csv",
  "https://docs.google.com/spreadsheets/d/e/2PACX-1vSAKIyowf9Shrwg84hXR1yLFS-AqaKO0BGKRd9HX3Ro1TKxitsVYp4yCWY6acyzUlISAAZMKIbYwsef/pub?output=csv"
];

let originalData = [];
let selectedData = [];

function switchTab(index){
  document.querySelectorAll(".tab").forEach((t,i)=>{
    t.classList.toggle("active",i===index);
  });

  selectedData = [];
  document.getElementById("selectedList").innerHTML="";
  updateSummary();

  loadCsv(csvUrls[index]);
}

function loadCsv(url){
  Papa.parse(url,{
    download:true,
    header:true,
    complete:function(res){

      originalData = res.data
        .filter(r => r["効果"] || r["effect"])
        .map((r,i)=>({
          name: r["名前"] || r["name"] || "",
          prep_time: Number(r["準備時間"] || r["prep_time"] || 0),
          start_time: Number(r["発動時間"] || r["start_time"] || 0),
          effect: r["効果"] || r["effect"] || "",
          idx:i
        }));

      renderList();
    }
  });
}

function renderList(){
  const list = document.getElementById("orderList");
  list.innerHTML="";

  originalData.forEach(row=>{
    const div = createOrder(row);

    if(selectedData.some(s=>s.idx===row.idx)){
      div.classList.add("disabled");
    }

    div.onclick=()=>{
      if(selectedData.some(s=>s.idx===row.idx)){
        highlightSelected(row.idx);
        return;
      }
      addSelected(row);
    };

    list.appendChild(div);
  });
}

function createOrder(row){
  const div=document.createElement("div");
  div.className="order";
  div.dataset.id=row.idx;

  div.innerHTML=`
    <strong>${row.name}</strong><br>
    準備時間 ${formatTime(row.prep_time)}<br>
    発動時間 ${formatTime(row.start_time)}<br>
    ${row.effect}
  `;
  return div;
}

function addSelected(row){
  selectedData.push(row);

  const div=createOrder(row);
  div.onclick=()=>{
    selectedData=selectedData.filter(s=>s.idx!==row.idx);
    renderList();
    renderSelected();
    updateSummary();
  };

  document.getElementById("selectedList").appendChild(div);

  renderList();
  updateSummary();
}

function renderSelected(){
  const list=document.getElementById("selectedList");
  list.innerHTML="";
  selectedData.forEach(row=>{
    const div=createOrder(row);
    list.appendChild(div);
  });
}

function highlightSelected(idx){
  const items=document.querySelectorAll("#selectedList .order");
  items.forEach(i=>{
    if(Number(i.dataset.id)===idx){
      i.classList.add("highlight");
      setTimeout(()=>i.classList.remove("highlight"),800);
    }
  });
}

function updateSummary(){

  const LIMIT = 900; // 15分

  const totalPrep = selectedData.reduce((sum,r)=>sum+r.prep_time,0);
  const totalStart = selectedData.reduce((sum,r)=>sum+r.start_time,0);
  const totalUsed = totalPrep + totalStart;

  const remaining = LIMIT - totalUsed;

  document.getElementById("summary").innerHTML = `
    制限時間 15分（900秒）<br>
    使用時間 ${formatTime(totalUsed)}（${totalUsed}秒）<br>
    残り時間 <strong>${formatTime(Math.max(remaining,0))}</strong>
  `;
}

function formatTime(sec){
  sec = Number(sec) || 0;
  const m = Math.floor(sec / 60);
  const s = sec % 60;
  return `${m}分${s}秒`;
}

loadCsv(csvUrls[0]);
</script>

</body>
</html>
