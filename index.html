<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>オーダーコンポーザー（CSV版）</title>
<link rel="stylesheet" href="style.css"> <!-- 元サイトCSS -->
<style>
body { font-family: sans-serif; }
#composer-container { display: flex; padding: 20px; }
#selected-orders, #order-list { width: 350px; border: 1px solid #aaa; padding: 10px; margin-right: 20px; }
.order-item { padding: 5px 10px; margin-bottom: 6px; border: 1px solid #ccc; cursor: grab; background-color: #f9f9f9; display: flex; align-items: center; }
.order-item.dragging { background-color: #d0f0ff; }
.order-item img { width: 40px; height: 40px; margin-right: 8px; object-fit: contain; }
button { margin: 5px 0; padding: 5px 10px; }
</style>
</head>
<body>

<h2>オーダーコンポーザー（CSV版）</h2>
<div id="composer-container">
  <!-- 左側: 選択オーダー（順番入れ替え可能） -->
  <div id="selected-orders">
    <h3>選択オーダー</h3>
  </div>

  <!-- 右側: 全部(by時間) -->
  <div id="order-list">
    <h3>全部(by時間)</h3>
  </div>

  <!-- 操作ボタン -->
  <div id="composer-controls">
    <button id="calculate-time">合計時間を計算</button>
    <button id="reset-order">順番リセット</button>
    <p id="total-time">合計時間：0</p>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
<script>
// CSVファイルURL
const csvUrl = 'orders.csv';
let originalData = [];

// CSV読み込み
Papa.parse(csvUrl, {
  download: true,
  header: true,
  complete: function(results) {
    originalData = results.data.filter(row => row.effect);
    renderOrderList(sortByTime(originalData));
  },
  error: function(err){
    console.error('CSV読み込み失敗', err);
    alert('データ読み込みに失敗しました。CSVの形式を確認してください。');
  }
});

// 時間順ソート
function sortByTime(data) {
  return [...data].sort((a,b)=> (Number(a.prep_time)+Number(a.start_time)) - (Number(b.prep_time)+Number(b.start_time)));
}

// 右側: 全部(by時間)リスト描画
function renderOrderList(data){
  const listDiv = document.getElementById('order-list');
  listDiv.querySelectorAll('.order-item').forEach(el=>el.remove());

  data.forEach((row,index)=>{
    const div = document.createElement('div');
    div.className = 'order-item';
    div.draggable = true;
    div.dataset.index = index;

    const img = document.createElement('img');
    img.src = row.image_url || '';
    img.alt = row.name1;
    div.appendChild(img);

    const text = document.createElement('span');
    text.textContent = `${row.effect} (${row.level}) - ${row.prep_time}+${row.start_time}秒 - ${row.name1}${row.name2?','+row.name2:''}`;
    div.appendChild(text);

    // ダブルクリックで左側に移動
    div.addEventListener('dblclick', ()=>moveToSelected(row));

    listDiv.appendChild(div);
  });

  enableDragAndDrop();
}

// 左側: 選択オーダーに追加
function moveToSelected(row){
  const selDiv = document.getElementById('selected-orders');

  const div = document.createElement('div');
  div.className = 'order-item';
  div.draggable = true;

  const img = document.createElement('img');
  img.src = row.image_url || '';
  img.alt = row.name1;
  div.appendChild(img);

  const text = document.createElement('span');
  text.textContent = `${row.effect} (${row.level}) - ${row.prep_time}+${row.start_time}秒 - ${row.name1}${row.name2?','+row.name2:''}`;
  div.appendChild(text);

  selDiv.appendChild(div);
  enableDragAndDrop();
}

// ドラッグ＆ドロップ（両方のリスト対応）
function enableDragAndDrop(){
  const lists = [document.getElementById('order-list'), document.getElementById('selected-orders')];
  let dragSrc = null;

  lists.forEach(list=>{
    list.querySelectorAll('.order-item').forEach(item=>{
      item.addEventListener('dragstart', e=>{
        dragSrc = item;
        item.classList.add('dragging');
      });
      item.addEventListener('dragend', e=>{
        item.classList.remove('dragging');
      });
      item.addEventListener('dragover', e=>e.preventDefault());
      item.addEventListener('drop', e=>{
        e.preventDefault();
        if(dragSrc && dragSrc !== item){
          const nodes = Array.from(list.querySelectorAll('.order-item'));
          const dragIndex = nodes.indexOf(dragSrc);
          const dropIndex = nodes.indexOf(item);
          if(dragIndex < dropIndex){
            list.insertBefore(dragSrc, item.nextSibling);
          } else {
            list.insertBefore(dragSrc, item);
          }
        }
      });
    });
  });
}

// 合計時間計算
document.getElementById('calculate-time').addEventListener('click', ()=>{
  const items = document.querySelectorAll('#selected-orders .order-item');
  let total = 0;
  items.forEach(div=>{
    const times = div.textContent.match(/(\d+)\+(\d+)秒/);
    if(times){
      total += Number(times[1]) + Number(times[2]);
    }
  });
  document.getElementById('total-time').textContent = `合計時間：${total}秒`;
});

// 順番リセット
document.getElementById('reset-order').addEventListener('click', ()=>{
  renderOrderList(sortByTime(originalData));
  document.getElementById('selected-orders').querySelectorAll('.order-item').forEach(el=>el.remove());
  document.getElementById('total-time').textContent = '合計時間：0';
});
</script>
</body>
</html>
