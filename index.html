<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Order Composer</title>

<style>
body{font-family:sans-serif;background:#f5f5f5;margin:0;padding:0;}
.tabs{display:flex;background:#222;}
.tabs button{flex:1;padding:12px;border:none;background:#333;color:white;cursor:pointer;}
.tabs button.active{background:#007bff;}
.container{display:flex;padding:10px;gap:10px;}
.panel{flex:1;background:white;padding:10px;border-radius:6px;overflow:auto;max-height:80vh;}
.order{border-bottom:1px solid #ddd;padding:6px 0;}
.time-display{font-size:14px;color:#007bff;margin-top:4px;}
.memo{width:100%;margin-top:4px;}
button{margin-top:4px;}
</style>
</head>
<body>

<div class="tabs">
<button onclick="switchTab(1)" id="tab1" class="active">タブ1</button>
<button onclick="switchTab(2)" id="tab2">タブ2</button>
<button onclick="switchTab(3)" id="tab3">タブ3</button>
<button onclick="switchTab(4)" id="tab4">タブ4</button>
</div>

<div style="padding:10px;">
<input type="file" id="csvFile" accept=".csv">
<button onclick="resetAll()">リセット</button>
<button onclick="shareOrders()">共有URLコピー</button>
</div>

<div class="container">
<div class="panel">
<h3>オーダー一覧</h3>
<div id="orderList"></div>
</div>

<div class="panel">
<h3>選択オーダー</h3>
<div id="selected"></div>
<div style="margin-top:10px;">
<input type="number" id="waitSeconds" placeholder="秒数">
<button onclick="addWait()">待つ追加</button>
</div>
</div>
</div>

<script>

let originalData=[];
let currentTab=1;

// タブ
function switchTab(tab){
currentTab=tab;
document.querySelectorAll(".tabs button").forEach(b=>b.classList.remove("active"));
document.getElementById("tab"+tab).classList.add("active");
renderOrders();
}

// CSV
document.getElementById("csvFile").addEventListener("change",function(e){
const file=e.target.files[0];
if(!file) return;

const reader=new FileReader();
reader.onload=function(evt){
const lines=evt.target.result.split("\n");
originalData=[];
lines.forEach((line,i)=>{
if(i===0) return;
const cols=line.split(",");
if(cols.length<5) return;
originalData.push({
idx:i,
tab:Number(cols[0]),
name:cols[1],
prep:Number(cols[2]),
start:Number(cols[3]),
effect:Number(cols[4])
});
});
renderOrders();
};
reader.readAsText(file);
});

function renderOrders(){
const list=document.getElementById("orderList");
list.innerHTML="";
originalData.filter(o=>o.tab===currentTab).forEach(o=>{
const div=document.createElement("div");
div.className="order";
div.innerHTML=`
<strong>${o.name}</strong><br>
準備:${o.prep}秒 発動:${o.start}秒
<button onclick="addSelected(${o.idx})">追加</button>
`;
list.appendChild(div);
});
}

function addSelected(idx){
const row=originalData.find(r=>r.idx===idx);
if(!row) return;

const div=document.createElement("div");
div.className="order";
div.dataset.idx=row.idx;
div.dataset.prep=row.prep;
div.dataset.start=row.start;
div.dataset.effect=row.effect;

div.innerHTML=`
<strong>${row.name}</strong>
<div class="time-display"></div>
<textarea class="memo" placeholder="メモ"></textarea>
<button onclick="removeOrder(this)">削除</button>
`;

document.getElementById("selected").appendChild(div);
updateTimes();
}

function addWait(){
const sec=Number(document.getElementById("waitSeconds").value);
if(!sec && sec!==0) return;

const id="wait_"+Date.now();
const div=document.createElement("div");
div.className="order";
div.dataset.idx=id;
div.dataset.prep=0;
div.dataset.start=sec;
div.dataset.effect=0;

div.innerHTML=`
<strong>待つ ${sec}秒</strong>
<div class="time-display"></div>
<button onclick="removeOrder(this)">削除</button>
`;

document.getElementById("selected").appendChild(div);
updateTimes();
}

function removeOrder(btn){
btn.parentElement.remove();
updateTimes();
}

function resetAll(){
document.getElementById("selected").innerHTML="";
updateTimes();
}

// 時間計算
function updateTimes(){
let remaining=900;
document.querySelectorAll("#selected .order").forEach(div=>{
const prep=Number(div.dataset.prep);
const start=Number(div.dataset.start);

const remainText=formatTime(remaining);
const activation=remaining-prep;
const activationText=formatTime(activation);
const effectEnd=remaining-prep-start;
const effectText=formatTime(effectEnd);

div.querySelector(".time-display").innerHTML=
`残り ${remainText}<br>
発動 ${activationText}<br>
効果終了 ${effectText}`;

remaining=effectEnd;
});
}

function formatTime(sec){
const sign=sec<0?"-":"";
sec=Math.abs(sec);
const m=Math.floor(sec/60);
const s=sec%60;
return `${sign}${m}分${s.toString().padStart(2,"0")}秒`;
}

// ===============================
// ★ 秒表示崩れ完全修正版 共有機能
// ===============================

// UTF8安全Base64
function encodeData(obj){
return btoa(
String.fromCharCode(...new TextEncoder().encode(JSON.stringify(obj)))
);
}

function decodeData(str){
return JSON.parse(
new TextDecoder().decode(
Uint8Array.from(atob(str),c=>c.charCodeAt(0))
)
);
}

function shareOrders(){
const items=[...document.querySelectorAll("#selected .order")];
const data=items.map(div=>({
tab:currentTab,
idx:div.dataset.idx,
prep:Number(div.dataset.prep),
start:Number(div.dataset.start),
effect:Number(div.dataset.effect),
memo:div.querySelector(".memo")?
div.querySelector(".memo").value:""
}));

const url=location.origin+location.pathname+"?share="+encodeData(data);
navigator.clipboard.writeText(url);
alert("共有URLをコピーしました");
}

// 復元
window.addEventListener("load",()=>{
const params=new URLSearchParams(location.search);
const share=params.get("share");
if(!share) return;

try{
const decoded=decodeData(share);
if(decoded.length===0) return;

switchTab(decoded[0].tab);

setTimeout(()=>{
decoded.forEach(item=>{

if(String(item.idx).startsWith("wait_")){
const div=document.createElement("div");
div.className="order";
div.dataset.idx=item.idx;
div.dataset.prep=0;
div.dataset.start=Number(item.start);
div.dataset.effect=0;

div.innerHTML=`
<strong>待つ ${item.start}秒</strong>
<div class="time-display"></div>
<button onclick="removeOrder(this)">削除</button>
`;
document.getElementById("selected").appendChild(div);
return;
}

const row=originalData.find(r=>String(r.idx)===String(item.idx));
if(row){
addSelected(row);
const last=[...document.querySelectorAll("#selected .order")].pop();
last.dataset.prep=Number(item.prep);
last.dataset.start=Number(item.start);
last.dataset.effect=Number(item.effect);
if(item.memo){
last.querySelector(".memo").value=item.memo;
}
}
});

updateTimes();
},300);

}catch(e){
console.log("復元エラー",e);
}
});

</script>
</body>
</html>
