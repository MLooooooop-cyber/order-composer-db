<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>オーダーコンポーザーDB</title>
<style>
body { font-family: sans-serif; background: #f5f5f5; margin: 20px; }
h1 { margin-bottom: 10px; }
.controls { margin-bottom: 15px; }
input, select { margin-right: 10px; padding: 5px; }
.card {
  background: white; padding: 15px; margin-bottom: 15px;
  border-radius: 10px; box-shadow: 0 2px 6px rgba(0,0,0,0.1);
}
.rarity-UR { border-left: 6px solid gold; }
.rarity-SSR { border-left: 6px solid crimson; }
.rarity-SR { border-left: 6px solid orange; }
.rarity-R { border-left: 6px solid teal; }
</style>
</head>
<body>

<h1>オーダーコンポーザー一覧</h1>

<div class="controls">
  <input type="text" id="search" placeholder="オーダー名・効果を検索">
  <select id="filterRarity">
    <option value="">全レアリティ</option>
    <option value="UR">UR</option>
    <option value="SSR">SSR</option>
    <option value="SR">SR</option>
    <option value="R">R</option>
  </select>
  <select id="sortCost">
    <option value="">コスト順</option>
    <option value="asc">昇順</option>
    <option value="desc">降順</option>
  </select>
</div>

<div id="orders">読み込み中...</div>

<script>
const sheetURL = "orders.csv"; // GitHub リポジトリに置いた CSV

let ordersData = [];

async function loadData() {
  try {
    const response = await fetch(sheetURL);
    const csv = await response.text();
    const rows = csv.trim().split("\n").slice(1);
    ordersData = rows.map(row => {
      const cols = row.split(",");
      return {
        id: cols[0],
        name: cols[1],
        rarity: cols[2],
        cost: parseInt(cols[3]) || 0,
        effect: cols[4],
        duration: cols[5],
        note: cols[6]
      };
    });
    render();
  } catch(e) {
    document.getElementById("orders").innerHTML = "データ読み込みに失敗しました";
    console.error(e);
  }
}

function render() {
  const container = document.getElementById("orders");
  container.innerHTML = "";

  const searchText = document.getElementById("search").value.toLowerCase();
  const filterRarity = document.getElementById("filterRarity").value;
  const sortCost = document.getElementById("sortCost").value;

  let filtered = ordersData.filter(order => {
    const matchText = order.name.toLowerCase().includes(searchText) ||
                      order.effect.toLowerCase().includes(searchText);
    const matchRarity = !filterRarity || order.rarity === filterRarity;
    return matchText && matchRarity;
  });

  if(sortCost === "asc") filtered.sort((a,b)=>a.cost-b.cost);
  if(sortCost === "desc") filtered.sort((a,b)=>b.cost-a.cost);

  if(filtered.length === 0) {
    container.innerHTML = "<p>該当するオーダーはありません</p>";
    return;
  }

  filtered.forEach(order => {
    container.innerHTML += `
      <div class="card rarity-${order.rarity}">
        <h3>${order.name}</h3>
        <p><strong>レア:</strong> ${order.rarity} / <strong>コスト:</strong> ${order.cost}</p>
        <p>${order.effect}</p>
        <small>${order.duration || ""}</small>
      </div>
    `;
  });
}

// イベントリスナーでリアルタイム反映
document.getElementById("search").addEventListener("input", render);
document.getElementById("filterRarity").addEventListener("change", render);
document.getElementById("sortCost").addEventListener("change", render);

loadData();
</script>

</body>
</html>
