<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>スキルマッチツール</title>

<style>

body{
font-family:sans-serif;
display:flex;
gap:20px;
padding:20px;
}

#skillList{
width:300px;
height:500px;
overflow:auto;
border:1px solid #aaa;
}

#selected{
width:250px;
height:500px;
border:1px solid #aaa;
overflow:auto;
}

.skill{
padding:6px;
cursor:pointer;
border-bottom:1px solid #eee;
}

.skill:hover{
background:#eee;
}

.tab{
display:inline-block;
padding:5px 10px;
border:1px solid #aaa;
cursor:pointer;
margin-right:5px;
}

.tab.active{
background:#ddd;
}

.selectedItem{
padding:5px;
border-bottom:1px solid #ddd;
cursor:grab;
}

.searchBox{
margin-bottom:10px;
}

</style>
</head>


<body>

<div>

<input id="search" class="searchBox" placeholder="スキル検索">

<div id="tabs"></div>

<div id="skillList"></div>

</div>


<div>

<h3>選択スキル</h3>

<div id="selected"></div>

</div>



<script>

const skills=[

{name:"火属性攻撃",type:"属性"},
{name:"水属性攻撃",type:"属性"},
{name:"風属性攻撃",type:"属性"},
{name:"バフ強化",type:"バフデバフ"},
{name:"デバフ弱体",type:"バフデバフ"},
{name:"発動率UP",type:"発動率"},
{name:"MP回復",type:"MP"},
{name:"MP消費軽減",type:"MP"},
{name:"盾防御",type:"盾"},
{name:"反射盾",type:"盾"},
{name:"特殊効果",type:"その他"}

]

const types=[
"全部",
"属性",
"バフデバフ",
"発動率",
"MP",
"盾",
"その他"
]

let currentType="全部"

function renderTabs(){

const tabs=document.getElementById("tabs")
tabs.innerHTML=""

types.forEach(t=>{

const tab=document.createElement("span")
tab.className="tab"
if(t===currentType)tab.classList.add("active")

tab.textContent=t

tab.onclick=()=>{
currentType=t
renderTabs()
renderSkills()
}

tabs.appendChild(tab)

})

}

function renderSkills(){

const list=document.getElementById("skillList")
list.innerHTML=""

const search=document.getElementById("search").value

skills
.filter(s=>{

if(currentType!=="全部" && s.type!==currentType)return false

if(search && !s.name.includes(search))return false

return true

})
.forEach(skill=>{

const div=document.createElement("div")

div.className="skill"

div.textContent=skill.name+" ["+skill.type+"]"

div.onclick=(e)=>addSkill(skill,e.shiftKey)

list.appendChild(div)

})

}

function addSkill(skill,toTop){

const box=document.getElementById("selected")

const div=document.createElement("div")
div.className="selectedItem"
div.textContent=skill.name

if(toTop)
box.prepend(div)
else
box.appendChild(div)

enableDrag(div)

}

function enableDrag(el){

el.draggable=true

el.ondragstart=e=>{
dragged=el
}

el.ondragover=e=>{
e.preventDefault()
}

el.ondrop=e=>{
e.preventDefault()
if(dragged!==el){

const parent=el.parentNode

parent.insertBefore(dragged,el)

}

}

}

let dragged=null

document.getElementById("search").oninput=renderSkills

renderTabs()
renderSkills()

</script>

</body>
</html>
