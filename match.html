<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Match Tool</title>

<style>

body{
font-family:sans-serif;
margin:20px;
}

.container{
display:flex;
gap:20px;
}

.left{
width:250px;
border:1px solid #ccc;
padding:10px;
}

.right{
flex:1;
}

.item{
padding:6px;
border:1px solid #ccc;
margin-bottom:4px;
cursor:move;
background:#fafafa;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,120px);
gap:6px;
}

.cell{
border:1px solid #aaa;
height:60px;
display:flex;
align-items:center;
justify-content:center;
position:relative;
overflow:hidden;
}

/* =========================
   属性システム完全版
========================= */

.attr-cell{
position:relative;
}

.attr-cell::before{
content:"";
position:absolute;
inset:0;
clip-path:polygon(0 0,100% 0,0 100%);
z-index:0;
}

.attr-cell::after{
content:"";
position:absolute;
inset:0;
clip-path:polygon(100% 0,100% 100%,0 100%);
z-index:0;
}

.attr-cell span{
position:relative;
z-index:1;
}

/* top */

.attr-top-fire::before{background:#ffe6e6;}
.attr-top-water::before{background:#e6f0ff;}
.attr-top-wind::before{background:#eaffea;}
.attr-top-light::before{background:#fff6cc;}
.attr-top-dark::before{background:#f2e6ff;}

/* bottom */

.attr-bottom-fire::after{background:#ffe6e6;}
.attr-bottom-water::after{background:#e6f0ff;}
.attr-bottom-wind::after{background:#eaffea;}
.attr-bottom-light::after{background:#fff6cc;}
.attr-bottom-dark::after{background:#f2e6ff;}

</style>
</head>

<body>

<h2>Match Tool</h2>

<div class="container">

<div class="left" id="leftList"></div>

<div class="right">
<button onclick="generate()">Match</button>
<div id="result" class="grid"></div>
</div>

</div>

<script>

/* サンプルデータ */

const items=[
{name:"A",attr:["火"]},
{name:"B",attr:["水"]},
{name:"C",attr:["風"]},
{name:"D",attr:["光"]},
{name:"E",attr:["闇"]},
{name:"F",attr:["火","水"]},
{name:"G",attr:["光","火"]},
{name:"H",attr:["闇","風"]}
]

const left=document.getElementById("leftList")

items.forEach(item=>{
const div=document.createElement("div")
div.className="item"
div.draggable=true
div.textContent=item.name
div.dataset.attr=item.attr.join(",")

div.addEventListener("dragstart",dragStart)
div.addEventListener("dragover",dragOver)
div.addEventListener("drop",drop)

left.appendChild(div)
})

let dragTarget=null

function dragStart(e){
dragTarget=this
}

function dragOver(e){
e.preventDefault()
}

function drop(e){
e.preventDefault()
if(dragTarget!==this){
const parent=this.parentNode
parent.insertBefore(dragTarget,this)
}
}

/* =====================
   属性判定
===================== */

function applyAttribute(cell,attrs){

cell.classList.add("attr-cell")

const hasFire=attrs.includes("火")
const hasWater=attrs.includes("水")
const hasWind=attrs.includes("風")
const hasLight=attrs.includes("光")
const hasDark=attrs.includes("闇")

let top=null
let bottom=null

if(hasLight && hasDark){
top="light"
bottom="dark"
}

else if(hasLight){

top="light"

if(hasFire)bottom="fire"
else if(hasWater)bottom="water"
else if(hasWind)bottom="wind"

}

else if(hasDark){

top="dark"

if(hasFire)bottom="fire"
else if(hasWater)bottom="water"
else if(hasWind)bottom="wind"

}

else{

if(hasFire && hasWater){
top="fire"
bottom="water"
}

else if(hasFire && hasWind){
top="fire"
bottom="wind"
}

else if(hasWater && hasWind){
top="water"
bottom="wind"
}

else if(hasFire){
top="fire"
}

else if(hasWater){
top="water"
}

else if(hasWind){
top="wind"
}

}

if(top)cell.classList.add("attr-top-"+top)
if(bottom)cell.classList.add("attr-bottom-"+bottom)

}

/* =====================
   match生成
===================== */

function generate(){

const result=document.getElementById("result")
result.innerHTML=""

const list=[...document.querySelectorAll(".item")]

list.forEach(el=>{

const cell=document.createElement("div")
cell.className="cell"

const span=document.createElement("span")
span.textContent=el.textContent

cell.appendChild(span)

const attrs=el.dataset.attr.split(",")

applyAttribute(cell,attrs)

result.appendChild(cell)

})

}

</script>

</body>
</html>
