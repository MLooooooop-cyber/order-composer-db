<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Order Composer - Match</title>

<style>
body{margin:0;background:#f2f2f2;font-family:Arial,sans-serif;font-size:13px;}
.wrapper{width:1200px;margin:20px auto;}
.title{font-size:20px;margin-bottom:10px;}
.main{display:flex;gap:15px;}

.panel{background:#fff;border:1px solid #ccc;padding:10px;}
.left{width:420px;}
.right{flex:1;}

.scroll{height:600px;overflow-y:auto;border:1px solid #ddd;padding:5px;}

.order{
display:flex;
align-items:flex-start;
border:1px solid #e0e0e0;
margin-bottom:4px;
padding:4px;
background:#ffffff;
cursor:pointer;
position:relative;
overflow:hidden;
}

.order.wait{background:#e8e8e8;}
.order.disabled{background:#ddd !important;opacity:0.5;cursor:not-allowed;}
.order.dragging{opacity:0.4;}
.order.highlight{animation:flash 0.6s ease;}

@keyframes flash{
0%{background:#ffe082;}
100%{background:#fafafa;}
}

.order img{
width:36px;
height:36px;
object-fit:contain;
margin-right:6px;
}

.info{
flex:1;
line-height:1.3;
word-break:break-all;
display:flex;
flex-direction:column;
}

.memo{
width:100%;
margin-top:4px;
font-size:12px;
box-sizing:border-box;
}

.timebox{
width:170px;
text-align:right;
font-weight:bold;
margin-right:6px;
line-height:1.4;
}

.controls{margin-bottom:8px;}

button{
font-size:12px;
padding:2px 6px;
margin-right:4px;
}

.total{
margin-top:6px;
font-weight:bold;
}

#typeFilters label{
margin-right:10px;
font-size:12px;
cursor:pointer;
}

#searchBox{
width:200px;
padding:3px;
font-size:12px;
}

/* ===== 三角レイヤー ===== */

.order::before{
content:"";
position:absolute;
top:0;
left:0;
width:45%;
height:45%;
clip-path:polygon(0 0,100% 0,0 100%);
z-index:0;
}

.order::after{
content:"";
position:absolute;
bottom:0;
right:0;
width:45%;
height:45%;
clip-path:polygon(100% 0,100% 100%,0 100%);
z-index:0;
}

/* ===== TOPカラー ===== */

.attr-top-fire::before{background:#fff2f2;}
.attr-top-water::before{background:#f2f6ff;}
.attr-top-wind::before{background:#f2fff2;}
.attr-top-light::before{background:#fff9cc;}
.attr-top-dark::before{background:#f4e6ff;}

/* ===== BOTTOMカラー ===== */

.attr-bottom-fire::after{background:#fff2f2;}
.attr-bottom-water::after{background:#f2f6ff;}
.attr-bottom-wind::after{background:#f2fff2;}
.attr-bottom-light::after{background:#fff9cc;}
.attr-bottom-dark::after{background:#f4e6ff;}

/* ===== 文字前面 ===== */

.order img,
.info,
.timebox{
position:relative;
z-index:1;
}

</style>
</head>

<body>

<div class="wrapper">
<div class="title">Order Composer - Match</div>

<div class="main">

<div class="panel left">

<div class="controls">
<button onclick="addWait(5)">+5秒</button>
<button onclick="addWait(10)">+10秒</button>

<input type="number" id="waitInput" style="width:70px;">
<button onclick="addCustomWait()">追加</button>

<button onclick="resetAll()">リセット</button>
<button onclick="shareOrders()">共有URLコピー</button>
</div>

<div id="selected" class="scroll"></div>

<div class="total" id="totalTime">
残り時間 15分0秒 ／ 発動 0分0秒<br>合計: 0秒
</div>

</div>

<div class="panel right">

<div style="margin-bottom:6px;">
<input type="text" id="searchBox" placeholder="スキル検索">
</div>

<div id="typeFilters" style="margin-bottom:8px;">
<label><input type="checkbox" value="属性" checked>属性</label>
<label><input type="checkbox" value="バフデバフ" checked>バフデバフ</label>
<label><input type="checkbox" value="発動率" checked>発動率</label>
<label><input type="checkbox" value="MP" checked>MP</label>
<label><input type="checkbox" value="盾" checked>盾</label>
<label><input type="checkbox" value="その他" checked>その他</label>
</div>

<div id="list" class="scroll"></div>

</div>
</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

<script>

const csvURL="https://docs.google.com/spreadsheets/d/e/2PACX-1vRNltvz7UjpE5-78DcrBQIJfHZgWF6fYUOoWFWqQp26-WCK55Dr-Lj_UfPJFLPdNtFJVH2mYgdjAD_0/pub?output=csv";

let originalData=[];
let restoreData=null;
let dragItem=null;

function formatTime(sec){
const sign=sec<0?"-":"";
sec=Math.abs(sec);
const m=Math.floor(sec/60);
const s=sec%60;
return sign+m+"分"+s+"秒";
}

function getAttributes(text){

const attrs=[];

if(text.includes("光")) attrs.push("light");
if(text.includes("闇")) attrs.push("dark");
if(text.includes("火")) attrs.push("fire");
if(text.includes("水")) attrs.push("water");
if(text.includes("風")) attrs.push("wind");

return attrs;

}

function applyAttrClass(div,text){

const attrs=getAttributes(text);

if(attrs.length===0) return;

let top=attrs[0];
let bottom=null;

/* 優先ルール */

if(attrs.includes("light") && attrs.includes("dark")){
top="light";
bottom="dark";
}

else if(attrs.includes("light")){
top="light";
bottom=attrs.find(a=>a!=="light");
}

else if(attrs.includes("dark")){
top="dark";
bottom=attrs.find(a=>a!=="dark");
}

else if(attrs.length>=2){
top=attrs[0];
bottom=attrs[1];
}

div.classList.add("attr-top-"+top);

if(bottom){
div.classList.add("attr-bottom-"+bottom);
}

}

</script>
</body>
</html>
