<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>match</title>

<style>

body{
font-family:sans-serif;
margin:0;
display:flex;
height:100vh;
}

#left{
width:40%;
border-right:1px solid #ccc;
overflow:auto;
padding:10px;
}

#right{
flex:1;
padding:10px;
overflow:auto;
}

.item{
display:flex;
gap:8px;
align-items:center;
border:1px solid #ddd;
padding:5px;
margin-bottom:5px;
cursor:pointer;
}

.order{
border:1px solid #aaa;
padding:6px;
margin-bottom:6px;
background:#fafafa;
}

.memo{
width:100%;
margin-top:4px;
}

.controls{
margin-bottom:10px;
}

.wait{
background:#eef;
}

</style>
</head>

<body>

<div id="left">
<h3>候補</h3>
<div id="list"></div>
</div>

<div id="right">

<div class="controls">
<button onclick="addWait()">待つ</button>
<button onclick="shareOrders()">共有URLコピー</button>
</div>

<div id="selected"></div>

</div>

<script>

let originalData=[];
let restoreData=null;

/* -------------------- CSV LOAD -------------------- */

function loadCsv(){

fetch("data.csv")
.then(r=>r.text())
.then(text=>{

const rows=text.trim().split("\n").slice(1);

originalData=rows.map(line=>{

const c=line.split(",");

return{
idx:c[0],
name1:c[1],
name2:c[2],
prep_time:Number(c[3]),
start_time:Number(c[4]),
effect:c[5],
image_url:c[6]
};

});

renderList();
restoreFromData();

});

}

/* -------------------- LEFT LIST -------------------- */

function renderList(){

const list=document.getElementById("list");
list.innerHTML="";

originalData.forEach(row=>{

const div=document.createElement("div");
div.className="item";

div.innerHTML=`
<div>${row.name1}</div>
<div>${row.name2}</div>
`;

div.onclick=()=>addSelected(row);

list.appendChild(div);

});

}

/* -------------------- ADD ORDER -------------------- */

function addSelected(row){

const div=document.createElement("div");
div.className="order";
div.draggable=true;

div.dataset.idx=row.idx;
div.dataset.start=row.start_time;

div.innerHTML=`

<div><b>${row.name1}</b> ${row.name2}</div>
<div>準備 ${row.prep_time}s / 効果 ${row.effect}</div>

<input class="memo" placeholder="メモ">

`;

addDrag(div);

document.getElementById("selected").appendChild(div);

updateTimes();

}

/* -------------------- WAIT -------------------- */

function addWait(){

const sec=prompt("何秒待つ？","10");

if(!sec) return;

const div=document.createElement("div");
div.className="order wait";
div.draggable=true;

div.dataset.idx="wait_"+Date.now();
div.dataset.start=sec;

div.innerHTML=`

<div>待つ ${sec}s</div>

<input class="memo" placeholder="メモ">

`;

addDrag(div);

document.getElementById("selected").appendChild(div);

updateTimes();

}

/* -------------------- DRAG -------------------- */

let dragItem=null;

function addDrag(el){

el.addEventListener("dragstart",()=>dragItem=el);

el.addEventListener("dragover",e=>{

e.preventDefault();

const parent=el.parentNode;

if(dragItem!==el){

parent.insertBefore(dragItem,el);

}

});

el.addEventListener("dragend",()=>{

dragItem=null;
updateTimes();

});

}

/* -------------------- TIME CALC -------------------- */

function updateTimes(){

let time=0;

document.querySelectorAll("#selected .order").forEach(div=>{

const start=Number(div.dataset.start)||0;

time+=start;

});

}

/* -------------------- SHARE -------------------- */

function shareOrders(){

const items=[...document.querySelectorAll("#selected .order")];

const data=items.map(div=>{

const idx=div.dataset.idx;
const start=div.dataset.start;

let memo="";
const memoInput=div.querySelector(".memo");
if(memoInput) memo=memoInput.value;

if(idx.startsWith("wait_")){

return "w"+start+"~"+encodeURIComponent(memo);

}

return idx+"~"+encodeURIComponent(memo);

}).join(",");

/* BASE64 SHORT */

const compressed=btoa(data)
.replace(/\+/g,"-")
.replace(/\//g,"_")
.replace(/=/g,"");

const url=location.origin+location.pathname+"?c="+compressed;

navigator.clipboard.writeText(url);

alert("共有URLコピーしました");

}

/* -------------------- RESTORE -------------------- */

function restoreFromData(){

if(!restoreData) return;

restoreData.forEach(item=>{

let div=null;

if(item.type==="wait"){

addWaitRestore(item);

div=[...document.querySelectorAll("#selected .order")].pop();

}else{

const row=originalData.find(r=>String(r.idx)===String(item.idx));

if(row){

addSelected(row);

div=[...document.querySelectorAll("#selected .order")].pop();

}

}

if(div && item.memo){

const memoInput=div.querySelector(".memo");

if(memoInput) memoInput.value=item.memo;

}

});

restoreData=null;
updateTimes();

}

/* WAIT RESTORE */

function addWaitRestore(item){

const div=document.createElement("div");

div.className="order wait";
div.draggable=true;

div.dataset.idx="wait_"+Date.now();
div.dataset.start=item.sec;

div.innerHTML=`

<div>待つ ${item.sec}s</div>

<input class="memo">

`;

addDrag(div);

document.getElementById("selected").appendChild(div);

}

/* -------------------- URL READ -------------------- */

window.addEventListener("load",()=>{

const params=new URLSearchParams(location.search);

const compressed=params.get("c");

if(compressed){

let decoded=compressed
.replace(/-/g,"+")
.replace(/_/g,"/");

decoded=atob(decoded);

restoreData=decoded.split(",").map(v=>{

const parts=v.split("~");

const key=parts[0];
const memo=parts[1]?decodeURIComponent(parts[1]):"";

if(key.startsWith("w")){

return{
type:"wait",
sec:Number(key.slice(1)),
memo:memo
};

}

return{
type:"order",
idx:key,
memo:memo
};

});

}

loadCsv();

});

</script>

</body>
</html>
